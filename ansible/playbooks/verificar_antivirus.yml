---
- name: Consultar Status dos Antivírus (CrowdStrike e Cylance)
  hosts: all
  gather_facts: no
  
  # Processa em lotes de 10 máquinas para segurança da rede
  serial: 10
  
  # Timeout de segurança para conexões lentas
  timeout: 20

  tasks:
    - name: Buscar programas instalados no Registro do Windows
      ansible.windows.win_shell: |
        $paths = @(
            "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKLM:\Software\Wow6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
        )
        $apps = Get-ItemProperty $paths | Select-Object DisplayName, DisplayVersion
        
        $crowdstrike = $apps | Where-Object { $_.DisplayName -like "*CrowdStrike*" }
        $cylanceProtect = $apps | Where-Object { $_.DisplayName -like "*CylanceProtect*" }
        $cylanceOptics = $apps | Where-Object { $_.DisplayName -like "*CylanceOptics*" }

        [PSCustomObject]@{
            "Servidor"         = $env:COMPUTERNAME
            "CrowdStrike"        = if ($crowdstrike) { "Instalado (" + $crowdstrike.DisplayVersion + ")" } else { "NÃO INSTALADO" }
            "Cylance Protect"   = if ($cylanceProtect) { "Instalado (" + $cylanceProtect.DisplayVersion + ")" } else { "NÃO INSTALADO" }
            "Cylance Optics"    = if ($cylanceOptics) { "Instalado (" + $cylanceOptics.DisplayVersion + ")" } else { "NÃO INSTALADO" }
        } | Format-List
      register: av_status
      ignore_errors: yes

    - name: Exibir Relatório na Tela
      ansible.builtin.debug:
        msg: "{{ av_status.stdout_lines }}"
      when: av_status is succeeded and av_status.stdout_lines is defined
